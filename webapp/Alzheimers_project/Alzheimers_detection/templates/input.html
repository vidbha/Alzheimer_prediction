    <h1 style="color:#000000"><center>Alzheimer's Prediction App</center></h1>
<center>
    <form action="/predict/" method="get">
    
            <table border = "1px" width="60%"  cellpadding="10px" bgcolor="White" align="center">
               
            <tr>
                <td>Select Gender</td>
                <td>
                    <input type="radio" name="gender" value="M"> M
                    <input type="radio" name="gender" value="F"> F
                    
                </td>
            </tr>
            <tr>
                <td>Enter age</td>
                <td>
                    <input type="number" placeholder=" age" name="Age">
                </td>
            </tr>
            <tr>
                <td>Enter years of education</td>
                <td>
                    <input type="number" placeholder=" education" name="EDUC">
                </td>
            </tr>
            <tr>
                <td>Enter Socio-Economic Status Rating </td>
                <td>
                    <input type="number" placeholder=" SES" name="SES">
                </td>  
            </tr>
            <tr>
                <td>Enter Mini-Mental State Examination Score  </td>
                <td>
                    <input type="number" placeholder=" MMSE" name="MMSE">
                </td>
            </tr>
            <tr>
                <td>Enter Cognitive Dementia Rating</td>
                <td>
                    <input type="text" inputmode="decimal" placeholder=" CDR" name="CDR">
                </td>
            </tr>
            
            
            <tr>
                <td>Enter estimated Total Intracrainial Volume </td>
                <td>
                    <input type="number" placeholder=" eTIV" name="eTIV">
                </td>
            </tr>
            <tr>
                <td>Enter normalized Whole Brain Volume </td>
                <td>
                    <input type="text" inputmode="decimal" placeholder=" nWBV" name="nWBV">
                </td>
            </tr>
            <tr>
                <td>Enter Atlas Scaling Factor </td>
                <td>
                    <input type="text" inputmode="decimal" placeholder=" ASF" name="ASF">
                </td>
            </tr>
            
            
            <tr>
                <td>
                    <button style="background-color: grey;border-color:black;" type="reset">Reset Form</button>
                </td>
                <td>
                    <button style="background-color: grey;border-color:black;"type="submit">Predict</button>
                </td>
            </tr>
        </table>
    </form>
